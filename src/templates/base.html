<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ t('site_title') }}{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    <a href="#main-content" class="skip-link">{{ t('skip_to_content') }}</a>
    <header>
        <nav aria-label="Main navigation">
            <div class="nav-container">
                <a href="/" class="nav-brand">{{ t('site_title') }}</a>
                <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
                    <span></span><span></span><span></span>
                </button>
                <ul class="nav-links">
                    <li><a href="/" {% if request.url.path == "/" %}aria-current="page"{% endif %}>{{ t('nav_lookup') }}</a></li>
                    <li><a href="/history" {% if request.url.path == "/history" %}aria-current="page"{% endif %}>{{ t('nav_history') }}</a></li>
                    <li class="lang-switch">
                        <a href="/set-language?lang={{ 'en' if lang == 'cs' else 'cs' }}" class="btn-lang" title="Switch language">{{ t('lang_switch_label') }}</a>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <main id="main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer>
        <div class="container">
            <p>{{ t('footer_text') }} <a href="https://www.gleif.org/" target="_blank" rel="noopener">{{ t('footer_gleif') }}</a></p>
        </div>
    </footer>

    <div id="toast-container" aria-live="polite"></div>

    <script>window.TRANSLATIONS = {{ translations_json | safe }};</script>
    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
